<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿嘉的赛博篝火Time！</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: monospace;
}
body {
    background: #050a1a;
    color: #fff;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
}
.star {
    position: absolute;
    background: rgb(247, 228, 210);
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
    0% { opacity: 0.15; }
    100% { opacity: 1; }
}

.campfire {
  position: absolute;
  bottom: 13vh;
  left: 50%;
  transform: translateX(-50%);
  width: clamp(270px, 80vw, 1000px);
  height: clamp(270px, 50vh, 900px);
  background-image: url('fire/fire1.png');
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  image-rendering: pixelated;
  animation: fire 3s infinite step-end;
  margin: 0;
  z-index: 1;
  display: none;
}
@keyframes fire {
  0%    { background-image: url('fire1.png'); }
  16.7% { background-image: url('fire2.png'); }
  33.3% { background-image: url('fire3.png'); }
  50%   { background-image: url('fire4.png'); }
  66.7% { background-image: url('fire5.png'); }
  83.3% { background-image: url('fire6.png'); }
  100%  { background-image: url('fire1.png'); }
}

.ground {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height:90vh;
  background-image: url('fire/bg.png');
  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-position: center bottom;
  image-rendering: pixelated;
  z-index: 0;
  display: none;
}

.avatar-area {
    position: absolute;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: clamp(10px, 3vw, 20px);
    flex-wrap: wrap;
    justify-content: center;
    max-width: 90vw;
    width: 100%;
    z-index: 2;
    display: none;
}

.avatar {
    width: clamp(60px, 18vw, 100px);
    height: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: transparent;
    border-radius: 6px;
    padding: 4px;
    position: relative;
    cursor: pointer;
}

.animal-image {
    width: var(--fox-size, 150px);
    height: var(--fox-size, 150px);
    object-fit: contain;
    image-rendering: pixelated;
    margin-bottom: 4px;
}

.bubble {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    border: 1px solid #0ff;
    border-radius: 4px;
    padding: 8px;
    font-size: 10px;
    color: #0ff;
    text-align: center;
    line-height: 1.2;
    white-space: nowrap;
    display: none;
    z-index: 10;
    max-width: 150px;
    word-wrap: break-word;
    white-space: normal;
}
.bubble.active {
    display: block;
}

.question-container {
    position: fixed;
    background: #111a2c;
    border: 2px solid #0ff;
    padding: 25px 20px;
    border-radius: 8px;
    z-index: 999;
    width: 90%;
    max-width: 350px;
    display: none;
}
.question-container.active {
    display: block;
}
.question-container input, 
.question-container textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0 20px;
    background: #000;
    color: #0ff;
    border: 1px solid #0ff;
    border-radius: 4px;
    font-size: 16px;
}
.question-container button {
    background: #0ff;
    color: #000;
    border: none;
    padding: 12px 20px;
    border-radius: 4px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
}
.question-title {
    font-size: 18px;
    margin-bottom: 15px;
    line-height: 1.4;
}

.animal-selection {
    position: fixed;
    background: #111a2c;
    border: 2px solid #0ff;
    padding: 25px 20px;
    border-radius: 8px;
    z-index: 999;
    width: 90%;
    max-width: 400px;
    display: none;
}
.animal-selection.active {
    display: block;
}
.animal-title {
    font-size: 18px;
    margin-bottom: 15px;
    text-align: center;
    line-height: 1.4;
}
.animal-options {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 15px;
}
.animal-options img {
    width: 60px;
    height: 60px;
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: 4px;
    image-rendering: pixelated;
}
.animal-options img:hover {
    border-color: #0ff;
}

.add-more-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #0ff;
    color: #000;
    border: none;
    padding: 10px 15px;
    border-radius: 4px;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    z-index: 998;
    display: none;
}
.add-more-btn.active {
    display: block;
}

.hint {
    position: fixed;
    top: 10%;
    /* left: 10%; */
    width: 90%;
    background: rgba(0, 26, 51, 0.57);
    border: 2px solid #0ff;
    border-radius: 8px;
    padding: 20px;
    color: #0ff;
    font-size: 16px;
    text-align: left;
    z-index: 1000;
    display: none;
    opacity: 0;
    transition: opacity 0.5s ease;
}
.hint.show {
    display: block;
    opacity: 1;
}
</style>
</head>

<body>
<div class="stars" id="stars"></div>
<div class="campfire"></div>
<div class="avatar-area" id="avatars"></div>
<div class="hint" id="hint">
    ！没错 其实这里是个公共留言板！<br>临近毕业,板主常面对布杂迷雾的路口，多参考看看大家都在做什么选择，也不失为一种努力开拓未来的积极心态吧^^
    <br>试着点点周围的匿名者吧^^</div>

<!-- 动物选择 + 昵称输入 -->
<div class="animal-selection active" id="animalSelect">
    <div class="animal-title">选择你的动物形象</div>
    <div class="animal-options">
        <img src="fire/fox.png" onclick="selectAnimal('fire/fox.png')" alt="狐狸">
    </div>

    <!-- 👇 这里是新增的昵称输入框 -->
    <div class="question-title" style="margin-top:20px;">输入你的昵称</div>
    <input type="text" id="nickname" placeholder="比如：小鹅、红星x、莓..." style="width:100%; padding:10px; background:#000; color:#0ff; border:1px solid #0ff; border-radius:4px;">
    
    <button onclick="goToQ1()" style="width:100%; margin-top:15px;">准备就绪—></button>
</div>

<!-- 问题1 -->
<div class="question-container" id="question1">
    <div class="question-title">好久不见呀${user.nickname}，最近过得好吗？</div>
    <textarea id="q1" rows="4">最近我</textarea>
    <button onclick="nextQuestion(1)">答好了</button>
</div>

<!-- 问题2 -->
<div class="question-container" id="question2">
    <div class="question-title">下一步有什么新的打算吗？</div>
    <textarea id="q2" rows="4">未来我</textarea>
    <button onclick="nextQuestion(2)">答好了</button>
</div>

<!-- 问题3 -->
<div class="question-container" id="question3">
    <div class="question-title">给大家留下一个词or句子吧：</div>
    <input id="q3">
    <button onclick="createAvatar()">加入我们的赛博篝火会</button>
</div>

<!-- <button class="add-more-btn" id="addMoreBtn" onclick="resetForNewUser()">添加更多小伙伴</button>
<div class="ground"></div> -->

<script>
// ==========================
// 🔥 腾讯文档配置（你只需要改这里）
// ==========================
const SHEET_KEY = "DWUF5QmN2bXJrS0Ri"; // 替换成你的腾讯文档key

// 保存数据到腾讯文档
async function saveToSheet(user) {
  try {
    const res = await fetch(`https://docs.qq.com/d/opi/openapi/sheet/v3/append?key=${SHEET_KEY}&gid=0`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        rows: [[
          user.nickname,
          user.animal,
          user.answers.q1,
          user.answers.q2,
          user.answers.q3
        ]]
      })
    });
    if (!res.ok) {
      console.error('保存到腾讯文档失败', res.status, res.statusText);
      return;
    }
    console.log('已保存到腾讯文档');
  } catch (e) {
    console.error('保存到腾讯文档异常', e);
  }
}
// 从腾讯文档加载所有用户
async function loadFromSheet() {
  try {
    let res = await fetch(`https://docs.qq.com/d/opi/openapi/sheet/v3/rows?key=${SHEET_KEY}&gid=0&limit=200`);
    let json = await res.json();
    let rows = json.data?.rows || [];
    if (rows.length <= 1) return;
    
    allUsers = rows.slice(1).map(item => ({
      nickname: item[0] || "",
      animal: item[1] || "fire/fox.png",
      answers: {
        q1: item[2] || "",
        q2: item[3] || "",
        q3: item[4] || ""
      }
    }));

    // 显示场景
    document.querySelector('.avatar-area').style.display = 'flex';
    document.querySelector('.campfire').style.display = 'block';
    document.querySelector('.ground').style.display = 'block';
    document.getElementById('addMoreBtn').classList.add('active');
    
    renderAllAvatars();
  } catch (e) {}
}

function makeStars() {
    const stars = document.getElementById('stars');
    for (let i = 0; i < 150; i++) {
        let s = document.createElement('div');
        s.classList.add('star');
        let size = Math.random() * 4 + 1;
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDelay = Math.random() * 2.5 + 's';
        stars.appendChild(s);
    }
}
makeStars();

let allUsers = [];
let currentUser = {
    nickname: "",  // 👈 新增：存昵称
    animal: "",
    answers: { q1: "", q2: "", q3: "" }
};

function updateFoxSize() {
    const campfire = document.querySelector('.campfire');
    if (!campfire) return;
    const rect = campfire.getBoundingClientRect();
    const foxSize = Math.max(80, Math.min(400, rect.height * 0.5));
    document.documentElement.style.setProperty('--fox-size', `${foxSize}px`);
}
window.addEventListener('resize', updateFoxSize);

// 选择动物
function selectAnimal(animalPath) {
    currentUser.animal = animalPath;
}

// 确认昵称 + 动物，进入答题
function goToQ1() {
    let nick = document.getElementById('nickname').value.trim();
    if (!nick) {
        alert("请输入你的昵称哦～");
        return;
    }
    if (!currentUser.animal) {
        alert("请先选择你的动物形象～");
        return;
    }
    currentUser.nickname = nick;

    // 更新问题1的标题，插入昵称
    document.querySelector('#question1 .question-title').innerHTML = `好久不见呀${nick}，最近过得好吗？`;

    document.getElementById('animalSelect').classList.remove('active');
    document.getElementById('question1').classList.add('active');
}

function nextQuestion(num) {
    currentUser.answers[`q${num}`] = document.getElementById(`q${num}`).value || '...';
    document.getElementById(`question${num}`).classList.remove('active');
    document.getElementById(`question${num + 1}`).classList.add('active');
}

// 创建小人
function createAvatar() {
    currentUser.answers.q3 = document.getElementById('q3').value || '...';
    allUsers.push({ ...currentUser });

    // 👇 这里是新增：保存到腾讯文档
    saveToSheet(currentUser);

    document.getElementById('question3').classList.remove('active');
    document.querySelector('.avatar-area').style.display = 'flex';
    document.querySelector('.campfire').style.display = 'block';
    document.querySelector('.ground').style.display = 'block';
    document.getElementById('addMoreBtn').classList.add('active');
    updateFoxSize();
    renderAllAvatars();

    // 显示提示框
    const hint = document.getElementById('hint');
    hint.classList.add('show');
    setTimeout(() => {
        hint.classList.remove('show');
    }, 50000); // 50秒后消失
}

// 渲染所有用户（气泡里显示昵称）
function renderAllAvatars() {
    const avatarsContainer = document.getElementById('avatars');
    avatarsContainer.innerHTML = '';
    allUsers.forEach((user, index) => {
        const avatarDiv = document.createElement('div');
        avatarDiv.className = 'avatar';
        avatarDiv.dataset.currentBubble = '0';
        avatarDiv.onclick = function() { showBubble(this); };
        // 👇 气泡分成四个，每个显示一部分
        avatarDiv.innerHTML = `
            <img class="animal-image" src="${user.animal}" alt="avatar">
            <div class="bubble bubble-0">我是 ${user.nickname}</div>
            <div class="bubble bubble-1">${user.answers.q1}</div>
            <div class="bubble bubble-2">${user.answers.q2}</div>
            <div class="bubble bubble-3">想对大家说${user.answers.q3}</div>
        `;
        avatarsContainer.appendChild(avatarDiv);
    });
}

function showBubble(avatar) {
    let current = parseInt(avatar.dataset.currentBubble);
    const bubbles = avatar.querySelectorAll('.bubble');
    bubbles.forEach(b => b.classList.remove('active'));
    bubbles[current].classList.add('active');
    current = (current + 1) % 4;
    avatar.dataset.currentBubble = current;
}

// 重置新用户
function resetForNewUser() {
    currentUser = { nickname: "", animal: "", answers: { q1: "", q2: "", q3: "" } };
    document.getElementById('nickname').value = "";
    document.getElementById('q1').value = "";
    document.getElementById('q2').value = "";
    document.getElementById('q3').value = "";
    document.getElementById('animalSelect').classList.add('active');
}

// 页面加载时读取数据
window.onload = function() {
  loadFromSheet();
  updateFoxSize();
}

</script>
</body>
</html>
