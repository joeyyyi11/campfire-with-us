<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿嘉的赛博篝火 Time！</title>
<style>
@font-face {
    font-family: 'zpix';
    src: url('zpix.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

:root {
    color-scheme: dark;
    --bg: #0d0521;
    --bg-deep: #240831;
    --surface: rgba(255, 255, 255, 0.08);
    --surface-strong: rgba(255, 255, 255, 0.12);
    --border: rgba(102, 73, 153, 0.6);
    --accent: #6a5fc1;
    --accent-soft: #79628c;
    --accent-bright: #c2ef4e;
    --text: #ffffff;
    --muted: #e5e7eb;
    --input-bg: rgba(255, 255, 255, 0.08);
    --input-border: rgba(255, 255, 255, 0.18);
    --button-shadow: rgba(0, 0, 0, 0.18);
    --panel-shadow: rgba(0, 0, 0, 0.35);
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: radial-gradient(circle at top, rgba(106, 95, 193, 0.18), transparent 24%), var(--bg);
    color: var(--text);
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: 'zpix', monospace;
    text-rendering: optimizeSpeed;
    -webkit-font-smoothing: none;
    -moz-osx-font-smoothing: grayscale;
}

.stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
}
.star {
    position: absolute;
    background: rgba(223, 219, 145, 0.7);
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
    0% { opacity: 0.15; }
    100% { opacity: 1; }
}

.campfire {
  position: absolute;
  bottom: 13vh;
  left: 50%;
  transform: translateX(-50%);
  width: clamp(270px, 80vw, 1000px);
  height: clamp(270px, 50vh, 900px);
  background-image: url('fire/fire1.png');
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  image-rendering: pixelated;
  animation: fire 3s infinite step-end;
  margin: 0;
  z-index: 1;
  display: none;
}
@keyframes fire {
  0%    { background-image: url('fire/fire1.png'); }
  16.7% { background-image: url('fire/fire2.png'); }
  33.3% { background-image: url('fire/fire3.png'); }
  50%   { background-image: url('fire/fire4.png'); }
  66.7% { background-image: url('fire/fire5.png'); }
  83.3% { background-image: url('fire/fire6.png'); }
  100%  { background-image: url('fire/fire1.png'); }
}

.ground {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 90vh;
  background-image: url('fire/bg.png');
  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-position: center bottom;
  image-rendering: pixelated;
  z-index: 0;
  display: none;
}

.avatar-area {
    position: absolute;
    bottom: 4vh;
    left: 50%;
    transform: translateX(-50%);
    width: 90vw;
    max-width: 90vw;
    min-height: calc(var(--fox-size, 150px) + 50px);
    overflow: visible;
    z-index: 2;
    display: none;
}

.avatar-area .avatar {
    position: absolute;
    top: 0;
    transition: left 0.3s ease;
}

.avatar {
    width: clamp(60px, 18vw, 100px);
    height: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: transparent;
    border-radius: 6px;
    padding: 4px;
    position: relative;
    transform-origin: bottom center;
    pointer-events: none;
}

.avatar .animal-image {
    pointer-events: auto;
}

.animal-image {
    width: var(--fox-size, 150px);
    height: var(--fox-size, 150px);
    object-fit: contain;
    image-rendering: pixelated;
    margin-bottom: 4px;
}

.bubble {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(25, 15, 45, 0.95);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 14px;
    color: var(--accent-bright);
    text-align: center;
    line-height: 0.9;
    display: none;
    z-index: 10;
    min-width: 140px;
    max-width: 260px;
    width: min(260px, 85vw);
    word-break: break-all;
    overflow-wrap: anywhere;
    white-space: normal;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}
.bubble.active {
    display: block;
}

/* 顶部滚动动物专用气泡（和下方完全一致） */
.top-animal-bubble {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(25, 15, 45, 0.95);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 24px 30px;
    font-size: 14px;
    color: var(--accent-bright);
    text-align: center;
    line-height: 1.8;
    z-index: 9999;
    min-width: 220px;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

.address {
    text-align: center;
    font-size: 14px;
    color: var(--accent-bright);
    margin-top: 0.2px;
    font-weight: 600;
}

.question-container,
.animal-selection {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(18px) saturate(180%);
    border: 1px solid var(--border);
    box-shadow: 0 24px 60px var(--panel-shadow);
    padding: 26px 24px;
    border-radius: 16px;
    z-index: 999;
    width: 92%;
    max-width: 420px;
    display: none;
}
.question-container.active,
.animal-selection.active {
    display: block;
}
.question-title,
.animal-title {
    font-size: 20px;
    margin-bottom: 18px;
    line-height: 1.35;
    color: var(--text);
}
.question-container input,
.question-container textarea,
.animal-selection input,
.animal-selection textarea {
    width: 100%;
    padding: 14px 16px;
    margin: 10px 0 20px;
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--input-border);
    border-radius: 14px;
    font-size: 16px;
}
.question-container textarea,
.animal-selection textarea {
    min-height: 110px;
    resize: vertical;
}
.question-container button,
.animal-selection button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: auto;
    min-width: 120px;
    background: var(--accent-soft);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.16);
    padding: 14px 18px;
    border-radius: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 14px;
    cursor: pointer;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.12), 0 12px 30px rgba(0,0,0,0.18);
    transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    margin: 5px;
}
.question-container button:hover,
.animal-selection button:hover {
    background: var(--accent);
    transform: translateY(-1px);
}

.button-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 20px;
}

.button-group {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 20px;
}

.button-group button {
    flex: 1;
}

.animal-selection {
    max-width: 520px;
}
.animal-options {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 18px;
}
.animal-options img {
    width: 100px;
    height: 100px;
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.14);
    border-radius: 18px;
    padding: 2px;
    background: rgba(255,255,255, 0.05);
    image-rendering: pixelated;
    transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}
.animal-options img:hover,
.animal-options img:focus-visible {
    border-color: var(--accent);
    transform: translateY(-2px);
    background: rgba(106,95,193,0.18);
}
.animal-options img.selected {
    border-color: var(--accent-bright);
    box-shadow: 0 0 0 4px rgba(106,95,193,0.22);
    transform: translateY(-1px);
    background: rgba(106,95,193,0.22);
}

.add-more-btn {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    width: auto;
    height: auto;
    background: var(--accent-soft);
    color: var(--text);
    border: 2px solid rgba(232, 229, 19, 0.647);
    padding: 8px 25px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 12px;
    line-height: 1.0;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    z-index: 1200;
    display: none;
    white-space: nowrap;
}

.add-more-btn:hover {
    background: var(--accent);
    transform: translateX(-50%) translateY(-1px);
}

@media (max-width: 600px) {
    .add-more-btn {
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 16px;
        font-size: 12px;
        border-radius: 12px;
    }
    
    .add-more-btn:hover {
        transform: translateX(-50%) translateY(-1px);
    }
}

.add-more-btn.active {
    display: block;
}

.hint {
    position: fixed;
    top: 10%;
    left: 50%;
    line-height: 1.5;
    transform: translateX(-50%);
    width: 80%;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    color: var(--text);
    font-size: 15px;
    text-align: left;
    z-index: 1000;
    display: none;
    opacity: 0;
    transition: opacity 0.4s ease, transform 0.4s ease;
    box-shadow: 0 24px 60px rgba(0,0,0,0.25);
    backdrop-filter: blur(16px) saturate(180%);
}
.hint.show {
    display: block;
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* 横向滚动容器 */
.scroll-container {
    position: fixed;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 900px;
    height: 180px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    z-index: 5;
    display: none;
    backdrop-filter: blur(12px) saturate(150%);
    box-shadow: 0 12px 30px rgba(0,0,0,0.2);
}

.scroll-content {
    display: flex;
    gap: 20px;
    padding: 20px;
    overflow-x: auto;
    overflow-y: hidden;
    height: 100%;
    align-items: center;
}

/* 隐藏滚动条但保留功能 */
.scroll-content::-webkit-scrollbar {
    height: 6px;
}

.scroll-content::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 3px;
}

.scroll-content::-webkit-scrollbar-thumb {
    background: rgba(106, 95, 193, 0.5);
    border-radius: 3px;
}

.scroll-content::-webkit-scrollbar-thumb:hover {
    background: rgba(106, 95, 193, 0.7);
}

/* 滚动容器中的动物卡片 */
.scroll-item {
    flex: 0 0 auto;
    width: 120px;
    height: 140px;
    background: rgba(181, 216, 44, 0.119);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px;
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease;
}

.scroll-item:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
}

.scroll-item .animal-image {
    width: 80px;
    height: 80px;
    margin-bottom: 8px;
}

.scroll-item .nickname {
    font-size: 12px;
    color: var(--text);
    text-align: center;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100px;
}

.scroll-item .loc {
    font-size: 10px;
    color: var(--accent-bright);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100px;
}

</style>
</head>

<body>
<div class="stars" id="stars"></div>
<div class="campfire"></div>
<div class="ground"></div>
<div class="avatar-area" id="avatars"></div>
<div class="scroll-container" id="scrollContainer">
    <div class="scroll-content" id="scrollContent"></div>
</div>
<div class="hint" id="hint">
    <div style="text-align:center;font-weight:bold;">！hola！这里姑且算是个公共留言板吧！</div>
    <br><div style="text-align:center;font-weight:bold">试着多点点周围的小“火”伴吧^^</div>
    <br>PSSS:<br>最近本人感觉有很多事要忙，也尝感迷茫，感觉生活品质大打折扣   . . ' ' .<br>于是这时候就会想到我的朋友们都在做什么呢，也在working hard还是hard-working呢 ?此外，有好多人也很久没联络，想知道对方动态但是突然小窗略诡异！<br>
    <div style="text-align:left;">于是这个小小的篝火现场慢慢漫（将）成型了，大家完全匿名地留下信息，各种分享集中起来<br>你们的体验分享一定会给很多人带来新思考
    </div>

</div>

<div class="animal-selection active" id="animalSelect">
    <div class="animal-title">选择你的"动物"形象</div>
    <div class="animal-options">
        <img src="fire/fox.png" onclick="selectAnimal(this, 'fire/fox.png')" alt="狐狸">
        <img src="fire/horse.png" onclick="selectAnimal(this, 'fire/horse.png')" alt="马">
        <img src="fire/bear.png" onclick="selectAnimal(this, 'fire/bear.png')" alt="熊">
        <img src="fire/rabbit.png" onclick="selectAnimal(this, 'fire/rabbit.png')" alt="兔子">
        <img src="fire/cat.png" onclick="selectAnimal(this, 'fire/cat.png')" alt="猫">
        <img src="fire/sheep.png" onclick="selectAnimal(this, 'fire/sheep.png')" alt="羊">
    </div>

    <div class="question-title" style="margin-top:20px;">输入你的昵称</div>
    <input type="text" id="nickname" placeholder="比如：小鹅、红星x、莓...">
    
    <div class="question-title" style="margin-top:20px;">此刻你之所在↓</div>
    <input type="text" id="loc" placeholder="xx·xx / 碎空星…"> 
    
    <button onclick="goToQ1()" style="width:100%; margin-top:15px;">准备就绪—></button>
    <button onclick="previewCampfire()" style="width:100%; margin-top:10px; background: var(--accent-soft);">先看看有谁在——></button>
</div>

<div class="question-container" id="question1">
    <div class="question-title">好久不见呀，最近过得好吗？</div>
    <textarea id="q1" rows="4">最近我</textarea>
    <div class="button-group">
        <button onclick="nextQuestion(1)">说完了</button>
    </div>
</div>

<div class="question-container" id="question2">
    <div class="question-title">下一步有什么打算？</div>
    <textarea id="q2" rows="4"></textarea>
    <div class="button-group">
        <button onclick="prevQuestion(2)">上一句</button>
        <button onclick="nextQuestion(2)">说完了</button>
    </div>
</div>

<div class="question-container" id="question3">
    <div class="question-title">给大家留下什么话or词 </div>
    <textarea id="q3" rows="4"></textarea>
    <div class="button-group">
        <button onclick="prevQuestion(3)">上一句</button>
        <button onclick="createAvatar()">👑·完_成·👑</button>
    </div>
</div>

<button class="add-more-btn" id="addMoreBtn" onclick="resetForNewUser()">添加更多小伙伴</button>

<script>
// ==========================
// 维格表配置
// ==========================
const VIKA_TOKEN = "uskCXrXOQATxrJcZPAJ7PjV";
const DATASHEET_ID = "dstZ3jSLdA6d9FA8WX";
const STORAGE_KEY = 'together-current-user';

let allUsers = [];
let currentUser = {
    nickname: "",
    animal: "",
    loc: "",
    answers: { q1: "", q2: "", q3: "" }
};

// 保存数据到维格表
function saveToSheet(user) {
  console.log('准备保存数据:', user);
  
  fetch(`https://api.vika.cn/fusion/v1/datasheets/${DATASHEET_ID}/records`, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + VIKA_TOKEN,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      records: [{
        fields: {
          nickname: user.nickname,
          animal: user.animal,
          loc: user.loc,
          q1: user.answers.q1,
          q2: user.answers.q2,
          q3: user.answers.q3
        }
      }]
    })
  })
  .then(response => {
    console.log('响应状态:', response.status);
    return response.json();
  })
  .then(data => {
    console.log('保存成功:', data);
    if (data.success) {
      console.log('数据已成功保存到维格表');
    } else {
      console.error('保存失败，响应数据:', data);
    }
  })
  .catch(err => {
    console.error('保存出错:', err);
  });
}

// 从维格表加载数据
function loadFromSheet() {
  fetch(`https://api.vika.cn/fusion/v1/datasheets/${DATASHEET_ID}/records`, {
    headers: { "Authorization": "Bearer " + VIKA_TOKEN }
  })
  .then(res => res.json())
  .then(json => {
    if (!json.success) return;
    
    allUsers = json.data.records.map(item => ({
        nickname: item.fields.nickname || "",
        animal: item.fields.animal || "fire/fox.png",
        loc: item.fields.loc || "",
        answers: {
            q1: item.fields.q1 || "",
            q2: item.fields.q2 || "",
            q3: item.fields.q3 || ""
        },
        createTime: item.fields.time || ""
    }));
    
    renderAll();
    console.log('加载成功，用户数量:', allUsers.length);
  })
  .catch(err => {
    console.log('加载失败', err);
  });
}

// 显示顶部动物专用气泡（和下方配色完全一致）
function showTopAnimalBubble(user) {
    const old = document.querySelector('.top-animal-bubble');
    if (old) old.remove();

    const bubble = document.createElement('div');
    bubble.className = 'top-animal-bubble';
    bubble.innerHTML = `
        <div>我是 ${user.nickname}</div>
        <div style="margin-top:8px;">${user.answers.q1}</div>
        <div style="margin-top:8px;">${user.answers.q2}</div>
        <div style="margin-top:8px;">想对大家说：${user.answers.q3}</div>
    `;
    document.body.appendChild(bubble);

    setTimeout(() => bubble.remove(), 2800);
}

// 随机数组
function shuffle(arr) {
    return [...arr].sort(() => Math.random() - 0.5);
}

// 判断是否为同一个用户
function isSameUser(a, b) {
    return a.nickname === b.nickname &&
           a.animal === b.animal &&
           a.answers.q1 === b.answers.q1 &&
           a.answers.q2 === b.answers.q2 &&
           a.answers.q3 === b.answers.q3;
}

function renderAll() {
    // 最新的在最左边：晚创建的排前面
    const sorted = [...allUsers].sort((a, b) => 
        new Date(b.createTime || 0) - new Date(a.createTime || 0)
    );

    // 下方随机6个s
    const bottomUsers = shuffle(sorted).slice(0, 6);

    // 上方只显示不在下方的
    const topUsers = sorted.filter(u => 
        !bottomUsers.some(b => isSameUser(u, b))
    );

    renderBottom(bottomUsers);
    renderTop(topUsers);
}

// 渲染下方篝火动物
function renderBottom(users) {
    const container = document.getElementById('avatars');
    container.innerHTML = '';
    const w = container.clientWidth || window.innerWidth * 0.9;
    const centerX = w / 2;
    const spacing = 130;

    users.forEach((user, i) => {
        const offset = i - Math.floor(users.length / 2);
        const el = document.createElement('div');
        el.className = 'avatar';
        el.innerHTML = `
            <img class="animal-image" src="${user.animal}" alt="">
            <div class="address">${user.loc}</div>
            <div class="bubble">我是 ${user.nickname}</div>
            <div class="bubble">${user.answers.q1}</div>
            <div class="bubble">${user.answers.q2}</div>
            <div class="bubble">想对大家说 ${user.answers.q3}</div>
        `;
        const img = el.querySelector('.animal-image');
        img.onclick = () => {
            const bs = el.querySelectorAll('.bubble');
            bs.forEach(b => b.classList.remove('active'));
            const idx = parseInt(el.dataset.idx || 0) % bs.length;
            bs[idx].classList.add('active');
            el.dataset.idx = idx + 1;
            setTimeout(() => bs.forEach(b => b.classList.remove('active')), 2000);
        };
        el.style.left = `${centerX + offset * spacing}px`;
        el.style.transform = 'translateX(-50%)';
        container.appendChild(el);
    });
}

// 渲染上方滚动动物
function renderTop(users) {
    const box = document.getElementById('scrollContent');
    box.innerHTML = '';
    users.forEach(user => {
        const item = document.createElement('div');
        item.className = 'scroll-item';
        item.innerHTML = `
            <img class="animal-image" src="${user.animal}" alt="">
            <div class="nickname">${user.nickname}</div>
            <div class="loc">${user.loc}</div>
        `;
        item.onclick = () => showTopAnimalBubble(user);
        box.appendChild(item);
    });
    document.getElementById('scrollContainer').style.display = users.length > 0 ? 'block' : 'none';
}

// 星星
function makeStars() {
    const stars = document.getElementById('stars');
    for (let i = 0; i < 150; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 4 + 1;
        s.style.width = s.style.height = size + 'px';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDelay = Math.random() * 2.5 + 's';
        stars.appendChild(s);
    }
}
makeStars();

// 自动尺寸
function updateFoxSize() {
    const c = document.querySelector('.campfire');
    const size = c ? Math.max(80, Math.min(400, c.getBoundingClientRect().height * 0.5)) : 120;
    document.documentElement.style.setProperty('--fox-size', size + 'px');
}
window.addEventListener('resize', updateFoxSize);

// 选择动物
function selectAnimal(el, path) {
    currentUser.animal = path;
    document.querySelectorAll('.animal-options img').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
}

// 流程
function goToQ1() {
    const nick = document.getElementById('nickname').value.trim();
    const loc = document.getElementById('loc').value.trim();
    if (!nick || !currentUser.animal) return alert('请填写完整信息');
    currentUser.nickname = nick;
    currentUser.loc = loc;
    document.getElementById('animalSelect').classList.remove('active');
    document.getElementById('question1').classList.add('active');
}

// 预览篝火页面（不创建角色）
function previewCampfire() {
    document.getElementById('animalSelect').classList.remove('active');
    document.querySelector('.avatar-area').style.display = 'block';
    document.querySelector('.campfire').style.display = 'block';
    document.querySelector('.ground').style.display = 'block';
    document.getElementById('addMoreBtn').classList.add('active');
    
    // 显示提示气泡
    const hint = document.getElementById('hint');
    hint.classList.add('show');
    setTimeout(() => {
        hint.classList.remove('show');
    }, 60000);
    
    // 渲染所有动物
    renderAll();
}

function nextQuestion(n) {
    currentUser.answers[`q${n}`] = document.getElementById(`q${n}`).value;
    document.getElementById(`question${n}`).classList.remove('active');
    document.getElementById(`question${n+1}`).classList.add('active');
}
function prevQuestion(n) {
    currentUser.answers[`q${n}`] = document.getElementById(`q${n}`).value;
    document.getElementById(`question${n}`).classList.remove('active');
    document.getElementById(`question${n-1}`).classList.add('active');
}

// 完成创建
function createAvatar() {
    currentUser.answers.q3 = document.getElementById('q3').value;
    allUsers.push({ ...currentUser });
    saveToSheet(currentUser);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(currentUser));

    document.getElementById('question3').classList.remove('active');
    document.querySelector('.avatar-area').style.display = 'block';
    document.querySelector('.campfire').style.display = 'block';
    document.querySelector('.ground').style.display = 'block';
    document.getElementById('addMoreBtn').classList.add('active');

    updateFoxSize();
    renderAll();

    const hint = document.getElementById('hint');
    hint.classList.add('show');
    setTimeout(() => hint.classList.remove('show'), 15000);
}

// 重置
function resetForNewUser() {
    currentUser = { nickname: '', animal: '', loc: '', answers: { q1: '', q2: '', q3: '' } };
    document.getElementById('nickname').value = '';
    document.getElementById('loc').value = '';
    document.getElementById('q1').value = '最近我';
    document.getElementById('q2').value = '';
    document.getElementById('q3').value = '';

    document.querySelector('.avatar-area').style.display = 'none';
    document.querySelector('.campfire').style.display = 'none';
    document.querySelector('.ground').style.display = 'none';
    document.getElementById('addMoreBtn').classList.remove('active');
    document.getElementById('hint').classList.remove('show');
    document.getElementById('scrollContainer').style.display = 'none';
    document.getElementById('animalSelect').classList.add('active');
}

// 进入页面自动读缓存：有记录直接进篝火页
window.onload = function() {
    loadFromSheet();
    
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            currentUser = JSON.parse(saved);
            document.getElementById('animalSelect').classList.remove('active');
            document.querySelector('.avatar-area').style.display = 'block';
            document.querySelector('.campfire').style.display = 'block';
            document.querySelector('.ground').style.display = 'block';
            document.getElementById('addMoreBtn').classList.add('active');
        } catch(e) {}
    }
    
    // 延迟调用确保篝火元素已完全渲染
    setTimeout(updateFoxSize, 100);
};
</script>
</body>
</html>
